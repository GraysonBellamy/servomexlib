[project]
site_name = "servomexlib"
site_description = "Async Python driver for Servomex SERVOPRO 4000-series gas analysers."
site_url = "https://graysonbellamy.github.io/servomexlib/"
repo_url = "https://github.com/GraysonBellamy/servomexlib"
repo_name = "GraysonBellamy/servomexlib"
edit_uri = "edit/main/docs/"
docs_dir = "docs"
site_dir = "site"
nav = [
    { Home = "index.md" },
    { Installation = "installation.md" },
    { Quickstart = [
        { Async = "quickstart-async.md" },
        { Sync = "quickstart-sync.md" },
    ] },
    { Guides = [
        { Analysers = "devices.md" },
        { Streaming = "streaming.md" },
        { Testing = "testing.md" },
        { Safety = "safety.md" },
        { Troubleshooting = "troubleshooting.md" },
    ] },
    { Reference = [
        { "Communication modes" = "protocol.md" },
    ] },
    { "API reference" = [
        { Overview = "api/index.md" },
        { "servomexlib" = "api/servomexlib.md" },
        { "servomexlib.transport" = "api/transport.md" },
        { "servomexlib.protocol" = "api/protocol.md" },
        { "servomexlib.registry" = "api/registry.md" },
        { "servomexlib.devices" = "api/devices.md" },
        { "servomexlib.manager" = "api/manager.md" },
        { "servomexlib.streaming" = "api/streaming.md" },
        { "servomexlib.sinks" = "api/sinks.md" },
        { "servomexlib.sync" = "api/sync.md" },
        { "servomexlib.testing" = "api/testing.md" },
        { "servomexlib.errors" = "api/errors.md" },
    ] },
    { Design = "design.md" },
]

[project.theme]
variant = "classic"
features = [
    "content.code.copy",
    "content.code.annotate",
    "navigation.instant",
    "navigation.tracking",
    "navigation.sections",
    "navigation.indexes",
    "search.highlight",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "deep purple"
accent = "purple"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "deep purple"
accent = "purple"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.plugins.mkdocstrings]
default_handler = "python"

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
show_source = true
show_root_heading = true
merge_init_into_class = true
separate_signature = true

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]
base_path = [".", "docs"]
check_paths = true

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true
